<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <link rel="icon" type="image/svg+xml" href="/vite.svg"/>
    <link href="src/style.css" rel="stylesheet"/>
    <script type="module" src="/src/main.js" defer></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>inchoobookstore</title>
</head>
<body class="">
<div x-data="{
    activeSidebar:null,
    closeSidebar(){
        this.activeSidebar = null;
    }
}">
    <header class="flex flex-col mt-5 border-b border-neutral-100">
        <a class="text-2xl font-bold text-center text-slate-800"
        >The Dev Bookstore</a
        >
        <nav>
            <ul class="hidden lg:flex space-x-6">
                <li>Programming</li>
                <li>Computer & Technology</li>
                <li>Design Basics</li>
                <li>About Us</li>
                <li>Contact</li>
            </ul>
        </nav>
        <div class="flex justify-between m-5">
            <button id="hamburgerButton" @click="activeSidebar = 'nav'">
                <svg
                        width="22"
                        height="23"
                        viewBox="0 0 22 23"
                        fill="none"
                        xmlns="http://www.w3.org/2000/svg"
                >
                    <path
                            fill-rule="evenodd"
                            clip-rule="evenodd"
                            d="M1 9C1 8.70163 1.11853 8.41548 1.3295 8.2045C1.54048 7.99353 1.82663 7.875 2.125 7.875H13.7215C14.0199 7.875 14.306 7.99353 14.517 8.2045C14.728 8.41548 14.8465 8.70163 14.8465 9C14.8465 9.29837 14.728 9.58452 14.517 9.7955C14.306 10.0065 14.0199 10.125 13.7215 10.125H2.125C1.82663 10.125 1.54048 10.0065 1.3295 9.7955C1.11853 9.58452 1 9.29837 1 9ZM1 4.5C1 4.20163 1.11853 3.91548 1.3295 3.7045C1.54048 3.49353 1.82663 3.375 2.125 3.375H17.875C18.1734 3.375 18.4595 3.49353 18.6705 3.7045C18.8815 3.91548 19 4.20163 19 4.5C19 4.79837 18.8815 5.08452 18.6705 5.29549C18.4595 5.50647 18.1734 5.625 17.875 5.625H2.125C1.82663 5.625 1.54048 5.50647 1.3295 5.29549C1.11853 5.08452 1 4.79837 1 4.5ZM1 13.5C1 13.2016 1.11853 12.9155 1.3295 12.7045C1.54048 12.4935 1.82663 12.375 2.125 12.375H17.875C18.1734 12.375 18.4595 12.4935 18.6705 12.7045C18.8815 12.9155 19 13.2016 19 13.5C19 13.7984 18.8815 14.0845 18.6705 14.2955C18.4595 14.5065 18.1734 14.625 17.875 14.625H2.125C1.82663 14.625 1.54048 14.5065 1.3295 14.2955C1.11853 14.0845 1 13.7984 1 13.5ZM1 18C1 17.7016 1.11853 17.4155 1.3295 17.2045C1.54048 16.9935 1.82663 16.875 2.125 16.875H13.7215C14.0199 16.875 14.306 16.9935 14.517 17.2045C14.728 17.4155 14.8465 17.7016 14.8465 18C14.8465 18.2984 14.728 18.5845 14.517 18.7955C14.306 19.0065 14.0199 19.125 13.7215 19.125H2.125C1.82663 19.125 1.54048 19.0065 1.3295 18.7955C1.11853 18.5845 1 18.2984 1 18Z"
                            fill="currentColor"
                            class="text-slate-500"
                    />
                </svg>
            </button>
            <div class="space-x-3">
                <button
                        id="cartButton"
                        class="bg-neutral-100 rounded-full px-3 py-1"
                >
                    <span class="hidden lg:block">Cart</span>
                    <svg
                            xmlns="http://www.w3.org/2000/svg"
                            fill="none"
                            viewBox="0 0 24 24"
                            width="22"
                            height="22"
                            stroke-width="2"
                            stroke="currentColor"
                            class="text-slate-500"
                    >
                        <path
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                d="M15.75 10.5V6a3.75 3.75 0 1 0-7.5 0v4.5m11.356-1.993 1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 0 1-1.12-1.243l1.264-12A1.125 1.125 0 0 1 5.513 7.5h12.974c.576 0 1.059.435 1.119 1.007ZM8.625 10.5a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm7.5 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z"
                        />
                    </svg>
                </button>
                <button
                        id="accountButton"
                        class="bg-neutral-100 rounded-full px-3 py-1"
                >
                    <span class="hidden lg:block">Account</span>
                    <svg
                            xmlns="http://www.w3.org/2000/svg"
                            fill="none"
                            viewBox="0 0 24 24"
                            width="22"
                            height="22"
                            stroke-width="2"
                            stroke="currentColor"
                            class="text-slate-500"
                    >
                        <path
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z"
                        />
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <!-- Mobile navigation -->

    <aside
            x-cloak
            id="navigationSidebar"
            x-show="activeSidebar === 'nav'" @click.outside="activeSidebar = null"
            x-transition:enter="transition ease-out duration-300 transform"
            x-transition:enter-start="-translate-x-full"
            x-transition:enter-end="translate-x-0"
            x-transition:leave="transition ease-in duration-200 transform"
            x-transition:leave-start="translate-x-0"
            x-transition:leave-end="-translate-x-full"
            class="fixed left-0 top-0 z-50 h-full w-full max-w-md bg-white shadow-lg"

    >
        <header class="flex items-center justify-between p-5">
            <h2 class="text-lg text-slate-500 font-bold">Navigation</h2>
            <button @click="closeSidebar()">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                     stroke="currentColor" class="size-6 text-slate-800">
                    <path stroke-lineca p="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/>
                </svg>
            </button>
        </header>
        <nav aria-label="Mobile navigation">
            <ul>
                <li class="text-slate-800 font-bold text-base leading-6 border-b py-3 px-5 border-neutral-200">
                    <button @click="openCategory('programming')" class="flex items-center justify-between w-full">
                        <span>Programming</span>

                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                             stroke="currentColor" class="size-5 text-slate-500">
                            <path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5"/>
                        </svg>
                    </button>
                </li>

                <li class="text-slate-800 font-bold border-b py-3 px-5 border-neutral-200">
                    <button @click="openCategory('programming')" class="flex items-center justify-between w-full">
                        <span>Computers & Technology</span>

                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                             stroke="currentColor" class="size-5 text-slate-500">
                            <path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5"/>
                        </svg>
                    </button>
                </li>

                <li class="text-slate-800 font-bold border-b py-3 px-5 border-neutral-200">
                    <button @click="openCategory('programming')" class="flex items-center justify-between w-full">
                        <span>Design Basics</span>

                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                             stroke="currentColor" class="size-5 text-slate-500">
                            <path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5"/>
                        </svg>
                    </button>
                </li>

                <li class="text-slate-800 font-bold border-b py-3 px-5 border-neutral-200">
                    <a href="/about">About Us</a>
                </li>

                <li class="text-slate-800 font-bold py-3 px-5">
                    <a href="/contact">Contact</a>
                </li>
            </ul>
        </nav>
    </aside>
</div>
</body>
</html>
