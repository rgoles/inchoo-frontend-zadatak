<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link href="src/style.css" rel="stylesheet" />
    <script type="module" src="/src/main.js" defer></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inchoo bookstore</title>
  </head>
  <body>
    <div x-data="bookstoreApp()">
      <header class="relative z-50 border-b border-neutral-100 bg-white pt-5">
        <div class="flex flex-col">
          <a
            href="/"
            x-text="siteTitle"
            class="text-center text-2xl leading-8 font-bold text-slate-800 md:hidden"
            >Page title</a
          >

          <!-- Mobile Layout -->

          <div class="m-5 flex items-center justify-between md:hidden">
            <button
              id="hamburgerButtonMobile"
              @click="openSidebar('nav')"
              aria-label="Open sidebar menu"
            >
              <svg
                width="22"
                height="23"
                viewBox="0 0 22 23"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  fill-rule="evenodd"
                  clip-rule="evenodd"
                  d="M1 9C1 8.70163 1.11853 8.41548 1.3295 8.2045C1.54048 7.99353 1.82663 7.875 2.125 7.875H13.7215C14.0199 7.875 14.306 7.99353 14.517 8.2045C14.728 8.41548 14.8465 8.70163 14.8465 9C14.8465 9.29837 14.728 9.58452 14.517 9.7955C14.306 10.0065 14.0199 10.125 13.7215 10.125H2.125C1.82663 10.125 1.54048 10.0065 1.3295 9.7955C1.11853 9.58452 1 9.29837 1 9ZM1 4.5C1 4.20163 1.11853 3.91548 1.3295 3.7045C1.54048 3.49353 1.82663 3.375 2.125 3.375H17.875C18.1734 3.375 18.4595 3.49353 18.6705 3.7045C18.8815 3.91548 19 4.20163 19 4.5C19 4.79837 18.8815 5.08452 18.6705 5.29549C18.4595 5.50647 18.1734 5.625 17.875 5.625H2.125C1.82663 5.625 1.54048 5.50647 1.3295 5.29549C1.11853 5.08452 1 4.79837 1 4.5ZM1 13.5C1 13.2016 1.11853 12.9155 1.3295 12.7045C1.54048 12.4935 1.82663 12.375 2.125 12.375H17.875C18.1734 12.375 18.4595 12.4935 18.6705 12.7045C18.8815 12.9155 19 13.2016 19 13.5C19 13.7984 18.8815 14.0845 18.6705 14.2955C18.4595 14.5065 18.1734 14.625 17.875 14.625H2.125C1.82663 14.625 1.54048 14.5065 1.3295 14.2955C1.11853 14.0845 1 13.7984 1 13.5ZM1 18C1 17.7016 1.11853 17.4155 1.3295 17.2045C1.54048 16.9935 1.82663 16.875 2.125 16.875H13.7215C14.0199 16.875 14.306 16.9935 14.517 17.2045C14.728 17.4155 14.8465 17.7016 14.8465 18C14.8465 18.2984 14.728 18.5845 14.517 18.7955C14.306 19.0065 14.0199 19.125 13.7215 19.125H2.125C1.82663 19.125 1.54048 19.0065 1.3295 18.7955C1.11853 18.5845 1 18.2984 1 18Z"
                  fill="currentColor"
                  class="text-slate-500"
                />
              </svg>
            </button>

            <div class="flex space-x-3">
              <button
                id="cartButtonMobile"
                class="rounded-full bg-neutral-100 px-3 py-1"
                @click="openSidebar('cart')"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="32"
                  height="32"
                  viewBox="0 0 24 24"
                  class="size-6 text-slate-500"
                  stroke="currentColor"
                  stroke-width="0"
                >
                  <path
                    fill="currentColor"
                    d="M6 22q-.825 0-1.412-.587T4 20V8q0-.825.588-1.412T6 6h2q0-1.65 1.175-2.825T12 2t2.825 1.175T16 6h2q.825 0 1.413.588T20 8v12q0 .825-.587 1.413T18 22zm0-2h12V8h-2v2q0 .425-.288.713T15 11t-.712-.288T14 10V8h-4v2q0 .425-.288.713T9 11t-.712-.288T8 10V8H6zm4-14h4q0-.825-.587-1.412T12 4t-1.412.588T10 6M6 20V8z"
                  />
                </svg>
              </button>
              <button
                id="accountButtonMobile"
                class="rounded-full bg-neutral-100 px-3 py-1"
                aria-label="Account dropdown"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  width="22"
                  height="22"
                  stroke-width="2"
                  stroke="currentColor"
                  class="text-slate-500"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z"
                  />
                </svg>
              </button>
            </div>
          </div>
        </div>

        <!-- Tablet and Desktop layout -->

        <div
          class="hidden items-center justify-between gap-4 md:m-6 md:flex 2xl:mx-32 2xl:my-10"
        >
          <div class="flex items-center space-x-8">
            <button
              id="hamburgerButtonTablet"
              aria-label="Open menu"
              @click="openSidebar('nav')"
              class="2xl:hidden"
            >
              <svg
                width="22"
                height="23"
                viewBox="0 0 22 23"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  fill-rule="evenodd"
                  clip-rule="evenodd"
                  d="M1 9C1 8.70163 1.11853 8.41548 1.3295 8.2045C1.54048 7.99353 1.82663 7.875 2.125 7.875H13.7215C14.0199 7.875 14.306 7.99353 14.517 8.2045C14.728 8.41548 14.8465 8.70163 14.8465 9C14.8465 9.29837 14.728 9.58452 14.517 9.7955C14.306 10.0065 14.0199 10.125 13.7215 10.125H2.125C1.82663 10.125 1.54048 10.0065 1.3295 9.7955C1.11853 9.58452 1 9.29837 1 9ZM1 4.5C1 4.20163 1.11853 3.91548 1.3295 3.7045C1.54048 3.49353 1.82663 3.375 2.125 3.375H17.875C18.1734 3.375 18.4595 3.49353 18.6705 3.7045C18.8815 3.91548 19 4.20163 19 4.5C19 4.79837 18.8815 5.08452 18.6705 5.29549C18.4595 5.50647 18.1734 5.625 17.875 5.625H2.125C1.82663 5.625 1.54048 5.50647 1.3295 5.29549C1.11853 5.08452 1 4.79837 1 4.5ZM1 13.5C1 13.2016 1.11853 12.9155 1.3295 12.7045C1.54048 12.4935 1.82663 12.375 2.125 12.375H17.875C18.1734 12.375 18.4595 12.4935 18.6705 12.7045C18.8815 12.9155 19 13.2016 19 13.5C19 13.7984 18.8815 14.0845 18.6705 14.2955C18.4595 14.5065 18.1734 14.625 17.875 14.625H2.125C1.82663 14.625 1.54048 14.5065 1.3295 14.2955C1.11853 14.0845 1 13.7984 1 13.5ZM1 18C1 17.7016 1.11853 17.4155 1.3295 17.2045C1.54048 16.9935 1.82663 16.875 2.125 16.875H13.7215C14.0199 16.875 14.306 16.9935 14.517 17.2045C14.728 17.4155 14.8465 17.7016 14.8465 18C14.8465 18.2984 14.728 18.5845 14.517 18.7955C14.306 19.0065 14.0199 19.125 13.7215 19.125H2.125C1.82663 19.125 1.54048 19.0065 1.3295 18.7955C1.11853 18.5845 1 18.2984 1 18Z"
                  fill="currentColor"
                  class="text-slate-500"
                />
              </svg>
            </button>

            <a
              href="/"
              x-text="siteTitle"
              class="text-left text-2xl leading-8 font-bold text-slate-800"
              >Page title</a
            >
          </div>

          <nav
            id="desktopNavigationMenu"
            aria-label="Desktop navigation menu"
            class="hidden 2xl:flex"
          >
            <ul class="flex space-x-10">
              <template x-for="item in navigation">
                <li>
                  <template x-if="item.type === 'category'">
                    <button
                      @click="openDesktopMenu(item.key)"
                      class="flex items-center"
                    >
                      <span
                        x-text="item.label"
                        class="relative flex items-center text-lg leading-7 font-bold text-slate-800 after:absolute after:bottom-0 after:left-0 after:h-px after:w-0 after:bg-blue-800 after:transition-all after:duration-300 hover:after:w-full"
                        >Nav label</span
                      >

                      <svg
                        xmlns="http://www.w3.org/2000/svg"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke-width="1.5"
                        stroke="currentColor"
                        class="size-5 text-slate-500"
                      >
                        <path
                          stroke-linecap="round"
                          stroke-linejoin="round"
                          d="m19.5 8.25-7.5 7.5-7.5-7.5"
                        />
                      </svg>
                    </button>
                  </template>

                  <template x-if="item.type === 'link'">
                    <a :href="item.href" class="flex items-center">
                      <span
                        x-text="item.label"
                        class="relative flex items-center text-lg leading-7 font-bold text-slate-800 after:absolute after:bottom-0 after:left-0 after:h-px after:w-0 after:bg-blue-800 after:transition-all after:duration-300 hover:after:w-full"
                        >Nav label</span
                      >
                    </a>
                  </template>
                </li>
              </template>
            </ul>
          </nav>

          <div class="flex space-x-10">
            <button
              id="cartButtonTablet"
              class="flex flex-row-reverse items-center gap-1 rounded-full bg-neutral-100 px-4 py-2"
              @click="openSidebar('cart')"
            >
              <span class="text-base leading-6 font-medium text-slate-800"
                >Cart</span
              >

              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="32"
                height="32"
                viewBox="0 0 24 24"
                class="size-6 text-slate-500"
                stroke="currentColor"
                stroke-width="0"
              >
                <path
                  fill="currentColor"
                  d="M6 22q-.825 0-1.412-.587T4 20V8q0-.825.588-1.412T6 6h2q0-1.65 1.175-2.825T12 2t2.825 1.175T16 6h2q.825 0 1.413.588T20 8v12q0 .825-.587 1.413T18 22zm0-2h12V8h-2v2q0 .425-.288.713T15 11t-.712-.288T14 10V8h-4v2q0 .425-.288.713T9 11t-.712-.288T8 10V8H6zm4-14h4q0-.825-.587-1.412T12 4t-1.412.588T10 6M6 20V8z"
                />
              </svg>
            </button>
            <div
              class="relative inline-block"
              @click.outside="isDropdownMenuOpen = false"
            >
              <button
                @click="isDropdownMenuOpen = !isDropdownMenuOpen"
                id="accountButtonTablet"
                class="relative flex flex-row-reverse items-center gap-1 rounded-full bg-neutral-100 px-4 py-2"
                aria-label="Account options"
              >
                <span class="text-base leading-6 font-medium text-slate-800"
                  >Account</span
                >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  width="22"
                  height="22"
                  stroke-width="2"
                  stroke="currentColor"
                  class="text-slate-500"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z"
                  />
                </svg>
              </button>
              <div class="absolute top-10" x-show="isDropdownMenuOpen === true">
                <ul
                  class="rounded bg-white shadow"
                  id="account-menu"
                  role="menu"
                >
                  <li class="block px-4 py-2" role="menuitem">
                    <a href="/login">Log In</a>
                  </li>
                  <li class="block px-4 py-2" role="menuitem">
                    <a href="/signup">Sign Up</a>
                  </li>
                </ul>
              </div>
            </div>
          </div>
        </div>
        <!-- Desktop dropdown navigation -->
        <div
          role="menu"
          aria-label="Desktop navigation"
          id="desktopNavigationDrawer"
          x-show="isDesktopMenuOpen === true"
          @click.outside="closeDesktopMenu()"
          x-cloak
          x-transition:enter="transition ease-out duration-200 transform origin-top"
          x-transition:enter-start="scale-y-85 opacity-0"
          x-transition:enter-end="scale-y-100 opacity-100"
          x-transition:leave="transition ease-in duration-200 transform origin-top"
          x-transition:leave-start="scale-y-100 opacity-100"
          x-transition:leave-end="scale-y-85 opacity-0"
          class="absolute top-full left-0 z-50 h-72 w-full bg-white shadow-lg"
        >
          <nav
            aria-label="Subcategory navigation"
            class="flex h-full items-center justify-center px-5"
          >
            <ul
              class="mx-11 ml-64 grid w-4/5 grid-cols-3 content-start items-center gap-x-20 gap-y-4"
            >
              <template
                x-for="item in (categories[activeCategory]?.items ?? [])"
                :key="item"
              >
                <li>
                  <a
                    href="#"
                    class="text-lg leading-7 font-bold text-slate-800"
                    x-text="item"
                  ></a>
                </li>
              </template>
            </ul>
            <div class="flex w-1/5 items-center justify-center">slika</div>
          </nav>
        </div>
      </header>

      <!-- Overlay

    <div
      x-show="activeSidebar === 'nav' || activeSidebar === 'cart' || isDesktopMenuOpen === true"
      x-transition.opacity
      @click="closeSidebar(); closeDesktopMenu()"
      class="fixed inset-0 z-40 bg-black/30"
      x-cloak
    ></div> -->

      <!-- Overlay for nav/cart -->
      <div
        x-show="activeSidebar === 'nav' || activeSidebar === 'cart'"
        x-transition.opacity
        @click="closeSidebar()"
        class="fixed inset-0 z-60 bg-black/30"
        x-cloak
      ></div>

      <!-- Overlay for desktop dropdown only -->
      <div
        x-show="isDesktopMenuOpen === true"
        x-transition.opacity
        @click="closeDesktopMenu()"
        class="fixed inset-x-0 top-[88px] bottom-0 z-40 bg-black/30"
        x-cloak
      ></div>

      <!-- Mobile / Tablet off-canvas navigation -->

      <aside
        aria-label="mobile navigation sidebar"
        id="navigationSidebar"
        x-show="activeSidebar === 'nav'"
        @click.outside="activeSidebar = null"
        x-cloak
        x-transition:enter="transition ease-out duration-200 transform"
        x-transition:enter-start="-translate-x-full"
        x-transition:enter-end="translate-x-0"
        x-transition:leave="transition ease-in duration-200 transform"
        x-transition:leave-start="translate-x-0"
        x-transition:leave-end="-translate-x-full"
        class="fixed top-0 left-0 z-60 h-full w-full overflow-y-auto bg-white shadow-lg md:max-w-sm"
      >
        <div x-show="activeCategory === null">
          <header class="z-50 flex items-center justify-between p-5">
            <h2 class="text-lg font-bold text-slate-500">Navigation</h2>
            <button
              id="closeNavSidebarButton"
              @click="closeSidebar()"
              aria-label="Close navigation menu"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
                class="size-6 text-slate-800"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M6 18 18 6M6 6l12 12"
                />
              </svg>
            </button>
          </header>
          <nav aria-label="Mobile navigation">
            <ul>
              <template x-for="item in navigation" :key="item.label">
                <li
                  class="border-b border-neutral-200 px-5 py-3 text-base leading-6 font-bold text-slate-800"
                >
                  <template x-if="item.type === 'category'">
                    <button
                      @click="openCategory(item.key)"
                      class="flex w-full items-center justify-between"
                    >
                      <span x-text="item.label">Nav label</span>

                      <svg
                        xmlns="http://www.w3.org/2000/svg"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke-width="1.5"
                        stroke="currentColor"
                        class="size-5 text-slate-500"
                      >
                        <path
                          stroke-linecap="round"
                          stroke-linejoin="round"
                          d="m8.25 4.5 7.5 7.5-7.5 7.5"
                        />
                      </svg>
                    </button>
                  </template>
                  <template x-if="item.type === 'link'">
                    <a :href="item.href" x-text="item.label">Nav label</a>
                  </template>
                </li>
              </template>
            </ul>
          </nav>
        </div>

        <!-- Navigation 2nd level mobile -->

        <div
          class="fixed top-0 left-0 z-50 h-full w-full overflow-y-auto bg-white shadow-lg md:max-w-sm"
          x-show="activeCategory !== null"
          x-cloak
          x-transition:enter="transition ease-out duration-200 transform"
          x-transition:enter-start="-translate-x-full"
          x-transition:enter-end="translate-x-0"
          x-transition:leave="transition ease-in duration-200 transform"
          x-transition:leave-start="translate-x-0"
          x-transition:leave-end="-translate-x-full"
        >
          <header class="flex items-center justify-between p-5">
            <h2
              class="text-lg leading-7 font-bold text-slate-500"
              x-text="categories[activeCategory]?.title"
            ></h2>

            <button @click="closeSidebar()" aria-label="Close navigation menu" aria-label="Close subcategory menu">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
                class="size-6 text-slate-800"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M6 18 18 6M6 6l12 12"
                />
              </svg>
            </button>
          </header>

          <div class="px-5 pb-6">
            <button
              @click="backToLevelOne()"
              class="flex items-center gap-1 text-sm leading-5 font-medium text-slate-800"
              type="button"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
                class="size-4 text-slate-500"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18"
                />
              </svg>
              <span>Back</span>
            </button>
          </div>

          <div class="px-5 pb-5">
            <a
              href="#"
              class="text-sm leading-5 font-medium text-slate-800 underline"
              x-text="categories[activeCategory]?.viewAllLabel"
            ></a>
          </div>

          <nav aria-label="Subcategory navigation" class="px-5">
            <ul class="space-y-3">
              <template
                x-for="item in (categories[activeCategory]?.items ?? [])"
                :key="item"
              >
                <li>
                  <a
                    href="#"
                    class="block text-lg leading-7 font-bold text-slate-800"
                    x-text="item"
                  ></a>
                </li>
              </template>
            </ul>
          </nav>
        </div>
      </aside>

      <!-- Cart sidebar -->

      <aside
        aria-label="Cart sidebar"
        id="cartSidebar"
        x-show="activeSidebar === 'cart'"
        @click.outside="activeSidebar = null"
        x-cloak
        x-transition:enter="transition ease-out duration-200 transform"
        x-transition:enter-start="translate-x-full"
        x-transition:enter-end="-translate-x-0"
        x-transition:leave="transition ease-in duration-200 transform"
        x-transition:leave-start="-translate-x-0"
        x-transition:leave-end="translate-x-full"
        class="fixed top-0 right-0 z-60 h-full w-full overflow-y-auto bg-white shadow-lg md:max-w-sm"
      >
        <div class="flex h-full flex-col">
          <header class="flex items-center justify-between p-5">
            <h2 class="text-lg font-bold text-slate-500">Cart</h2>
            <button
              id="closeCartSidebarButton"
              @click="closeSidebar()"
              aria-label="Close cart"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
                class="size-6 text-slate-800"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M6 18 18 6M6 6l12 12"
                />
              </svg>
            </button>
          </header>
          <section class="flex flex-1 flex-col">
            <p
              class="bg-neutral-100 px-6 py-1 text-base leading-6 font-normal text-slate-800"
              x-show="cart.length > 0"
            >
              <span
                x-text="cartCount()"
                class="inline-block w-[3ch] text-left tabular-nums"
                >0</span
              >
              <span> Items in cart</span>
            </p>
            <ul class="flex-1 space-y-2 overflow-y-auto px-6">
              <template x-for="product in cart" :key="product.productId">
                <li aria-label="Cart item" class="flex py-6">
                  <article
                    class="flex w-full items-center justify-between space-x-2"
                  >
                    <figure
                      class="flex h-full shrink-0 content-start items-start"
                    >
                      <img
                        :src="product.cartImage"
                        :alt="'Cover of ' + product.title"
                      />
                    </figure>
                    <div class="flex h-full flex-col content-start space-y-3">
                      <p
                        class="text-sm leading-5 font-bold text-slate-800"
                        x-text="product.title"
                      >
                        Book
                      </p>
                      <p
                        aria-label="Price"
                        class="text-sm leading-5 font-normal text-blue-800"
                        x-text="formatPrice(product.price)"
                      >
                        €00.00
                      </p>
                      <div
                        class="flex w-fit items-center gap-6 space-x-1 rounded-full bg-neutral-100 px-2 py-1.25"
                      >
                        <button
                          :aria-label="'Decrease quantity for ' + product.title"
                          @click="decreaseQuantity(product)"
                        >
                          <svg
                            xmlns="http://www.w3.org/2000/svg"
                            fill="none"
                            viewBox="0 0 24 24"
                            stroke-width="1.5"
                            stroke="currentColor"
                            class="size-6"
                          >
                            <path
                              stroke-linecap="round"
                              stroke-linejoin="round"
                              d="m19.5 8.25-7.5 7.5-7.5-7.5"
                            />
                          </svg>
                        </button>

                        <span
                          x-text="product.quantity"
                          class="w-[3ch] text-center tabular-nums"
                          >1</span
                        >

                        <button
                          :aria-label="'Increase quantity for ' + product.title"
                          @click="increaseQuantity(product)"
                        >
                          <svg
                            xmlns="http://www.w3.org/2000/svg"
                            fill="none"
                            viewBox="0 0 24 24"
                            stroke-width="1.5"
                            stroke="currentColor"
                            class="size-6"
                          >
                            <path
                              stroke-linecap="round"
                              stroke-linejoin="round"
                              d="m4.5 15.75 7.5-7.5 7.5 7.5"
                            />
                          </svg>
                        </button>
                      </div>
                    </div>

                    <button
                      class="flex h-full content-start"
                      @click="removeFromCart(product)"
                      :aria-label="'Remove ' + product.title + ' from cart'"
                    >
                      <svg
                        xmlns="http://www.w3.org/2000/svg"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke-width="1.5"
                        stroke="currentColor"
                        class="size-6 text-neutral-400"
                      >
                        <path
                          stroke-linecap="round"
                          stroke-linejoin="round"
                          d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0"
                        />
                      </svg>
                    </button>
                  </article>
                </li>
              </template>

              <template x-if="cart.length === 0">
                <p
                  class="space-x-20 pt-24 text-center text-base leading-6 font-bold text-slate-800"
                >
                  Your cart is currently empty.
                </p>
              </template>
            </ul>
            <div
              class="flex flex-col items-center space-y-5 bg-neutral-50 px-6 py-5"
              x-show="cart.length > 0"
            >
              <p
                class="flex w-full justify-between text-base leading-6 font-bold text-slate-800"
              >
                Cart Subtotal
                <span
                  class="text-xl leading-7 font-normal text-blue-800"
                  x-text="formatPrice(cartSubtotal())"
                ></span>
              </p>
              <hr class="w-full border-t border-neutral-300" />
              <button
                class="w-full rounded-full bg-orange-400 py-3 text-base leading-6 font-bold text-white"
              >
                Proceed to Checkout
              </button>
              <a
                href="#"
                class="w-fit border-b border-blue-800 text-base leading-6 font-normal text-slate-800"
                >View and Edit Cart</a
              >
            </div>
          </section>
        </div>
      </aside>

      <!-- Main / Article section -->
      <main class="md:m-6 2xl:mx-32 2xl:my-10">
        <article class="flex flex-col items-center 2xl:flex-row">
          <div class="hidden 2xl:block 2xl:w-1/5">
            Lorem ipsum dolor sit amet consectetur adipisicing elit. Quos, quod.
          </div>
          <section class="mx-5 mt-3.5 flex justify-center 2xl:w-2/5">
            <picture>
              <source
                :srcset="product.images.desktop"
                media="(min-width: 1536px)"
              />
              <source
                :srcset="product.images.tablet"
                media="(min-width: 768px)"
              />
              <img
                :src="product.images.mobile"
                :alt="product.images.alt"
                class="h-auto w-full"
              />
            </picture>
          </section>

          <section class="m-5 space-y-6 2xl:w-2/5">
            <div class="flex flex-col space-y-1">
              <p class="text-sm leading-5 font-bold text-slate-500">
                <a
                  :href="product.publisher.href"
                  x-text="product.publisher.name"
                  >Publisher name</a
                >
              </p>

              <header>
                <h1
                  id="product-title"
                  class="text-3xl leading-9 font-bold text-neutral-700"
                  x-text="product.title"
                >
                  Product title
                </h1>
              </header>

              <div class="flex items-center space-x-3">
                <p class="flex items-center space-x-1">
                  <span class="flex text-amber-400">
                    <template x-for="star in product.rating" :key="star">
                      <svg
                        xmlns="http://www.w3.org/2000/svg"
                        fill="currentColor"
                        viewBox="0 0 24 24"
                        stroke-width="1.5"
                        stroke="currentColor"
                        class="size-4"
                      >
                        <path
                          stroke-linecap="round"
                          stroke-linejoin="round"
                          d="M11.48 3.499a.562.562 0 0 1 1.04 0l2.125 5.111a.563.563 0 0 0 .475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 0 0-.182.557l1.285 5.385a.562.562 0 0 1-.84.61l-4.725-2.885a.562.562 0 0 0-.586 0L6.982 20.54a.562.562 0 0 1-.84-.61l1.285-5.386a.562.562 0 0 0-.182-.557l-4.204-3.602a.562.562 0 0 1 .321-.988l5.518-.442a.563.563 0 0 0 .475-.345L11.48 3.5Z"
                        />
                      </svg>
                    </template>
                  </span>
                  <span
                    class="text-sm font-bold text-neutral-700"
                    x-text="product.ratingValue"
                    >0.0</span
                  >
                  <a
                    href="#reviews"
                    class="text-sm font-bold text-neutral-400"
                    x-text="`(${product.reviewCount})`"
                    >(0)</a
                  >
                </p>
                <span class="text-neutral-300">|</span>
                <a
                  :href="product.writeReviewLink"
                  class="border-b border-blue-800 text-sm leading-5 font-normal"
                  >Write a review</a
                >
              </div>
            </div>

            <div class="flex flex-col">
              <div class="flex items-center space-x-3">
                <p>
                  <data
                    :value="currentPrice()"
                    class="text-2xl leading-8 font-normal text-blue-800"
                    x-text="formatPrice(currentPrice())"
                  ></data>
                </p>

                <template x-if="hasDiscount()">
                  <p
                    class="rounded-sm bg-red-100 p-1.5 text-xs font-extrabold text-red-400"
                    x-text="`-${discountPercent()}%`"
                  ></p>
                </template>
              </div>

              <template x-if="hasDiscount()">
                <p>
                  <s
                    class="text-xs leading-4 font-medium text-neutral-700"
                    x-text="formatPrice(product.price.base)"
                  ></s>
                </p>
              </template>
            </div>

            <section class="flex flex-col space-y-4">
              <h2
                id="details-heading"
                class="text-sm leading-5 font-bold text-neutral-700"
              >
                Details
              </h2>

              <dl class="grid grid-cols-1 gap-y-3 md:grid-cols-2 md:gap-x-14">
                <template x-for="detail in product.details" :key="detail.label">
                  <div
                    class="flex space-x-1 text-sm leading-5 font-medium text-neutral-700"
                  >
                    <dt x-text="`${detail.label}:`"></dt>

                    <dd>
                      <template x-if="detail.href">
                        <a
                          :href="detail.href"
                          class="border-b border-blue-800"
                          x-text="detail.value"
                        >
                        </a>
                      </template>

                      <template x-if="!detail.href">
                        <span x-text="detail.value"></span>
                      </template>
                    </dd>
                  </div>
                </template>
              </dl>
            </section>

            <section class="space-y-4">
              <h2
                id="description-heading"
                class="text-sm leading-5 font-bold text-neutral-700"
              >
                Description
              </h2>

              <template
                x-for="paragraph in product.description"
                :key="paragraph"
              >
                <p
                  class="text-sm leading-5 font-medium text-neutral-700"
                  x-text="paragraph"
                ></p>
              </template>
            </section>

            <section>
              <form
                action="/cart"
                method="post"
                @submit.prevent="addToCart(product)"
              >
                <button
                  type="submit"
                  class="w-full rounded-full bg-orange-400 py-3 leading-6 font-bold text-white"
                >
                  Add to Cart
                </button>
              </form>
            </section>
          </section>
        </article>
      </main>
    </div>
  </body>
</html>
